<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다묵자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #FF0000; --bg-color: #FFFF00; --text-color: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,0,0,0.05) 20px, rgba(0,0,0,0.05) 40px);
            color: var(--text-color); font-family: '궁서', 'Gungsuh', serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }
        .black-han { font-family: 'Black Han Sans', sans-serif; }
        .screen {
            display: none; width: 100%; max-width: 500px; padding: 15px; flex-direction: column; align-items: center; flex-grow: 1;
            background-color: #FFFFFF; border: 6px dashed var(--primary-color); box-shadow: 12px 12px 0px #0000EE; margin: 20px 0;
        }
        .screen.active { display: flex; }
        button, .btn-label {
            background: linear-gradient(180deg, #FF3333 0%, #990000 100%); color: #FFFF00; border: 5px solid #000000;
            padding: 15px 20px; font-size: 1.5rem; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
            text-align: center; display: inline-block; width: 100%; max-width: 350px; margin-top: 15px;
            line-height: 1.2; box-shadow: 6px 6px 0px #000000; transform: skewX(-5deg); transition: all 0.1s; text-shadow: 2px 2px 0px #000;
            position: relative; z-index: 10;
        }
        button:active, .btn-label:active { transform: skewX(-5deg) translate(6px, 6px); box-shadow: 0px 0px 0px #000000; }
        #image-upload { display: none !important; }
        .title { font-size: clamp(2rem, 9vw, 3rem); white-space: nowrap; color: var(--primary-color); text-align: center; -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0px #FFFF00; }
        .title-rabbit-img { width: 140px; height: 140px; object-fit: contain; margin-bottom: -55px; filter: drop-shadow(6px 6px 0px #0000EE); position: relative; z-index: 1; }
        .profile-text { color: #0000EE; font-size: 1.2rem; font-weight: bold; text-align: center; background-color: #FFFF00; padding: 5px; border: 2px solid #000; width: 100%; position: relative; z-index: 10; }
        .instruction-desc { color: #FFFFFF; background-color: #FF0000; font-size: 1.2rem; font-weight: bold; padding: 10px; text-align: center; border: 3px solid #000; width: 100%; position: relative; z-index: 10; line-height: 1.4; word-break: keep-all; }
        .mode-container { background-color: #000000; width: 100%; padding: 15px; border: 4px solid #000; margin-bottom: 15px; box-shadow: 6px 6px 0px #0000EE; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; }
        .mode-header { color: #00FF00; font-size: 1.3rem; margin-bottom: 10px; }
        .mode-selection { display: flex; gap: 10px; width: 100%; }
        .mode-radio { display: none; }
        .mode-label { flex: 1; padding: 10px 5px; border: 4px solid #000; background-color: #DDDDDD; text-align: center; font-family: 'Black Han Sans', sans-serif; cursor: pointer; box-shadow: 4px 4px 0px #FFFF00; }
        .mode-radio:checked + .mode-label { background-color: #FF00FF; color: #FFFFFF; animation: bg-blink 0.3s infinite; }
        @keyframes bg-blink { 0%, 100% { background-color: #FF00FF; } 50% { background-color: #0000EE; } }
        .preview-container { width: 100%; height: 220px; border: 8px inset #00FF00; background-color: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: #FFFF00; font-size: 1.2rem; font-weight: bold; position: relative; z-index: 10; }
        #image-preview { width: 100%; height: 100%; display: none; object-fit: contain; }

        /* ── 게임 헤더: 타이머 + 녹화중 한 줄에 ── */
        .game-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; font-size: 1.8rem; color: #FFFF00; text-shadow: 2px 2px 0px #000; -webkit-text-stroke: 1px #000; pointer-events: none; }
        #timer-display { display: flex; align-items: center; gap: 10px; }
        /* 녹화중 태그 — 타이머 바로 옆 */
        #rec-timer-tag { color: #00FF00; font-size: 1.1rem; animation: blink-text 0.5s infinite; white-space: nowrap; }
        @keyframes blink-text { 50% { opacity: 0; } }

        .instruction-text { color: #FFFFFF; font-size: 1.5rem; background-color: #000; padding: 5px; margin-bottom: 10px; text-align: center; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .game-area { position: relative; width: 100%; max-width: 400px; aspect-ratio: 3 / 4; margin: 0 auto; border: 8px solid #000; overflow: hidden; background-color: white; pointer-events: none; }
        #main-canvas { width: 100%; height: 100%; display: block; }
        /* rec-alert-text 제거 — 타이머 옆으로 이동했으므로 불필요 */
        #countdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.8); display: none; align-items: center; justify-content: center; color: #FFFF00; font-size: 8rem; -webkit-text-stroke: 4px #000; font-family: 'Black Han Sans'; z-index: 100; }
        .result-count { font-size: 3rem; color: #FFFF00; text-align: center; -webkit-text-stroke: 2px #000; font-family: 'Black Han Sans'; }
        .video-container { width: 100%; max-width: 350px; border: 6px solid #FF0000; overflow: hidden; box-shadow: 6px 6px 0px #FFFF00; margin-bottom: 20px; display: none; background-color: #222; }
        #result-video { width: 100%; display: block; }
    </style>
</head>
<body>
    <div id="screen-input" class="screen active">
        <h1 class="title black-han">★뭐든 먹어드립니다★</h1>
        <img src="assets/rabbit-head-idle.png" alt="콰삭이" class="title-rabbit-img">
        <marquee scrollamount="15" class="profile-text">▶ 이름: 콰삭이 ◀ ▶ 스펙: 처먹기 경력 베테랑 수준 ◀</marquee>
        <div class="instruction-desc">없0ㅓ졌으면 ㅎr는 것 ❅의로ㅣ 혼r영!<br>학교, 호ㅣㅅr, ㅅㅣ✿험, 싫0ㅓㅎr는 ㅅr람 등<br>무ㅓ든 ≫⚄먹0ㅓ드립ㄴㅣㄷr.❑</div>
        <div class="mode-container">
            <div class="mode-header black-han">▼ 게임 모드 선택 ▼</div>
            <div class="mode-selection">
                <input type="radio" name="game-mode" id="mode-infinite" value="infinite" class="mode-radio" checked>
                <label for="mode-infinite" class="mode-label">무한 갉아먹기</label>
                <input type="radio" name="game-mode" id="mode-10sec" value="10sec" class="mode-radio">
                <label for="mode-10sec" class="mode-label">10초 챌린지</label>
            </div>
        </div>
        <div class="preview-container" id="drop-zone">
            <span id="preview-placeholder">[사진을 끌어오거나 버튼 클릭]<br><br><span style="font-size: 1rem; color: #00FF00;">※ 배경 투명 이미지가 좋아요! ※</span></span>
            <img id="image-preview" src="" alt="미리보기">
        </div>
        <label for="image-upload" class="btn-label">사진 선택하기</label>
        <input type="file" id="image-upload" accept="image/*">
        <button id="start-btn" disabled>💥쾁찹찹추찹찹추💥<br><span style="font-size: 1rem; color: #FFFF00; font-family: '궁서';">(먹이러 가기)</span></button>
    </div>

    <div id="screen-game" class="screen">
        <div class="instruction-text black-han">!! 미친듯이 연타 !!</div>
        <div class="game-header black-han">
            <!-- ★ 타이머 + 녹화중 태그를 한 div 안에 -->
            <div id="timer-display">
                <span id="timer-text">타이머: --</span>
                <span id="rec-timer-tag"></span>
            </div>
            <div id="click-count">0번</div>
        </div>
        <div class="game-area" id="game-area">
            <canvas id="main-canvas" width="600" height="800"></canvas>
            <div id="countdown-overlay">3</div>
        </div>
        <button id="finish-game-btn" style="display: none;">결과 보기 (종료)</button>
    </div>

    <div id="screen-result" class="screen">
        <h2 class="black-han" style="color:#FF0000; font-size:3rem; -webkit-text-stroke:1px #FFF;">★ 결과 발표 ★</h2>
        <div class="result-count" id="final-result-text">--번 처먹었어요!</div>
        <div class="video-container" id="video-container"><video id="result-video" controls autoplay loop playsinline muted></video></div>
        <button id="save-video-btn" style="display: none; background: linear-gradient(180deg,#FF00FF,#880088);">녹화된 영상 저장하기</button>
        <button id="share-x-btn">𝕏 (Twitter) 자랑하기</button>
        <button id="retry-btn" style="background: linear-gradient(180deg,#555,#222);">다시 하기</button>
    </div>

    <script>
        // ── 에셋 ──
        const imgBody      = new Image(); imgBody.src      = 'assets/rabbit-body.png';
        const imgHeadIdle  = new Image(); imgHeadIdle.src  = 'assets/rabbit-head-idle.png';
        const imgHeadChomp = new Image(); imgHeadChomp.src = 'assets/rabbit-head-chomp.png';

        // ── 오디오 컨텍스트 (녹화에 오디오 포함) ──
        let audioCtx  = null;
        let audioDest = null;    // MediaStreamDestination → 녹화 스트림에 포함
        let eatBuffer = null;    // 디코딩된 AudioBuffer (fetch로 미리 로드)

        // 시작 버튼 클릭 시 한 번 호출
        async function initAudio() {
            if (audioCtx) return;
            audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
            audioDest = audioCtx.createMediaStreamDestination();

            // GainNode: 스피커 + 녹화 둘 다 연결
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.6;
            masterGain.connect(audioCtx.destination); // 스피커
            masterGain.connect(audioDest);            // 녹화 스트림
            audioCtx._masterGain = masterGain;

            // eat.mp3 미리 fetch → decodeAudioData
            try {
                const res  = await fetch('assets/eat.mp3');
                const buf  = await res.arrayBuffer();
                eatBuffer  = await audioCtx.decodeAudioData(buf);
            } catch(e) {
                console.warn('eat.mp3 로드 실패:', e);
            }
        }

        // 갉을 때마다 호출 — AudioBufferSourceNode는 1회용이라 매번 새로 만들어야 함
        function playEatSound() {
            if (!audioCtx || !eatBuffer) return;
            const src = audioCtx.createBufferSource();
            src.buffer = eatBuffer;
            src.connect(audioCtx._masterGain);
            src.start(0);
        }

        // ── 상태 ──
        let currentMode = 'infinite';
        let userImageObj = new Image(), isImageLoaded = false;
        let clicks = 0, eatProgress = 0;
        let isPlaying = false, isCountdown = false;
        let gameTimerInterval, gameTimeLeft = 10;
        let chompFrames = 0, floatingTexts = [], shakeIntensity = 0;
        let actionHeat = 0, focusAngle = 0, crumbs = [];
        let recTimeLeft = 5, recInterval;
        let mediaRecorder = null, recordedChunks = [], videoBlobUrl = null;
        let animationFrameId = null;
        const popWords    = ['다처먹어주마', '쾁쾁쾁', '첩첩첩'];
        const textColors  = ['#ffffff','#ffea00','#ff6600','#00ffcc','#ff99ff'];

        // ── DOM ──
        const screenInput      = document.getElementById('screen-input');
        const screenGame       = document.getElementById('screen-game');
        const screenResult     = document.getElementById('screen-result');
        const imageUpload      = document.getElementById('image-upload');
        const startBtn         = document.getElementById('start-btn');
        const mainCanvas       = document.getElementById('main-canvas');
        const ctx              = mainCanvas.getContext('2d');
        const timerText        = document.getElementById('timer-text');   // ★ span으로 분리
        const recTimerTag      = document.getElementById('rec-timer-tag');
        const clickCountDisplay= document.getElementById('click-count');
        const finishGameBtn    = document.getElementById('finish-game-btn');
        const resultVideo      = document.getElementById('result-video');
        const saveVideoBtn     = document.getElementById('save-video-btn');
        const videoContainer   = document.getElementById('video-container');
        const finalResultText  = document.getElementById('final-result-text');
        const gameArea         = document.getElementById('game-area');

        // ── 모드 ──
        document.getElementsByName('game-mode').forEach(r =>
            r.addEventListener('change', e => currentMode = e.target.value)
        );

        // ── 이미지 업로드 ──
        imageUpload.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                userImageObj = new Image();
                userImageObj.onload = () => {
                    isImageLoaded = true;
                    startBtn.disabled = false;
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                    document.getElementById('preview-placeholder').style.display = 'none';
                };
                userImageObj.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 드래그앤드롭
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', e => e.preventDefault());
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                imageUpload.files; // 참조만
                const dt = new DataTransfer();
                dt.items.add(file);
                imageUpload.files = dt.files;
                imageUpload.dispatchEvent(new Event('change'));
            }
        });

        function showScreen(s) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            s.classList.add('active');
        }

        // ── 시작 ──
        startBtn.addEventListener('click', async () => {
            if (!isImageLoaded) return;
            startBtn.disabled = true;
            await initAudio();
            startBtn.disabled = false;

            // 초기화
            clicks = 0; eatProgress = 0; floatingTexts = []; crumbs = [];
            shakeIntensity = 0; actionHeat = 0;
            recordedChunks = [];
            if (videoBlobUrl) { URL.revokeObjectURL(videoBlobUrl); videoBlobUrl = null; }
            if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
            clearInterval(gameTimerInterval); clearInterval(recInterval);

            // 캔버스 초기화 (잔상 제거)
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

            clickCountDisplay.textContent = '0번';
            finishGameBtn.style.display   = 'none';
            recTimerTag.textContent       = '';
            videoContainer.style.display  = 'none';
            saveVideoBtn.style.display    = 'none';
            resultVideo.src               = '';

            showScreen(screenGame);

            isCountdown = true;
            animationFrameId = requestAnimationFrame(gameLoop);

            let cd = 3;
            document.getElementById('countdown-overlay').style.display = 'flex';
            document.getElementById('countdown-overlay').textContent = cd;
            const cdInt = setInterval(() => {
                cd--;
                if (cd > 0) {
                    document.getElementById('countdown-overlay').textContent = cd;
                } else {
                    clearInterval(cdInt);
                    document.getElementById('countdown-overlay').style.display = 'none';
                    startGameLogic();
                }
            }, 1000);
        });

        // ── 게임 시작 ──
        function startGameLogic() {
            isCountdown = false;
            isPlaying   = true;
            recTimeLeft = 5;

            // ★ 녹화중 텍스트 — 타이머 옆 span에만 표시
            recTimerTag.textContent = `🔴 녹화중(${recTimeLeft}초)`;

            // ── MediaRecorder: 비디오 + 오디오 합치기 ──
            try {
                const videoStream = mainCanvas.captureStream(30);
                const audioStream = audioDest.stream; // audioCtx dest에서 나오는 오디오

                // 비디오 트랙 + 오디오 트랙 합성
                const combined = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...audioStream.getAudioTracks(),
                ]);

                // 지원 mimeType 탐색
                const types = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
                const mimeType = types.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch { return false; } }) || 'video/webm';

                mediaRecorder = new MediaRecorder(combined, { mimeType });

                mediaRecorder.ondataavailable = e => {
                    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    if (recordedChunks.length === 0) { saveVideoBtn.style.display = 'none'; return; }
                    const blob = new Blob(recordedChunks, { type: mimeType });
                    videoBlobUrl = URL.createObjectURL(blob);
                    resultVideo.src = videoBlobUrl;
                    resultVideo.load();

                    let done = false;
                    function show() {
                        if (done) return; done = true;
                        resultVideo.oncanplay = null;
                        videoContainer.style.display = 'block';
                        saveVideoBtn.style.display   = 'block';
                    }
                    resultVideo.oncanplay = show;
                    setTimeout(show, 4000);
                };

                mediaRecorder.start(200);

            } catch(e) {
                console.warn('녹화 실패:', e);
            }

            // 5초 녹화 타이머 (타이머 옆 카운트다운)
            recInterval = setInterval(() => {
                recTimeLeft--;
                if (recTimeLeft > 0) {
                    recTimerTag.textContent = `🔴 녹화중(${recTimeLeft}초)`;
                } else {
                    clearInterval(recInterval);
                    recTimerTag.textContent = ''; // 녹화 완료 후 사라짐
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                }
            }, 1000);

            // ── 게임 타이머 ──
            if (currentMode === '10sec') {
                gameTimeLeft = 10;
                timerText.textContent = `타이머: ${gameTimeLeft}초`;
                gameTimerInterval = setInterval(() => {
                    gameTimeLeft--;
                    timerText.textContent = `타이머: ${gameTimeLeft}초`;
                    if (gameTimeLeft <= 0) endGame();
                }, 1000);
            } else {
                timerText.textContent = '타이머: 무한';
                finishGameBtn.style.display = 'block';
            }
        }

        // ── 갉기 ──
        function triggerChomp() {
            if (!isPlaying) return;
            clicks++; eatProgress++;
            clickCountDisplay.textContent = `${clicks}번`;
            if (eatProgress >= 200) eatProgress = 0;

            actionHeat = Math.min(1, actionHeat + 0.25);
            playEatSound(); // ★ audioCtx 통해서 재생 → 영상에 오디오 포함
            shakeIntensity = 20; chompFrames = 6;

            for (let i = 0; i < 6; i++) {
                crumbs.push({
                    x: 300 + (Math.random()*80 - 40), y: 360,
                    vx: (Math.random()-0.5)*20, vy: (Math.random()*-15) - 5,
                    life: 1.0, size: Math.random()*10 + 5,
                    color: textColors[Math.floor(Math.random()*textColors.length)],
                    angle: Math.random()*6, spin: (Math.random()-0.5)*0.8,
                });
            }
            if (Math.random() < 0.6) {
                floatingTexts.push({
                    text:  popWords[Math.floor(Math.random()*popWords.length)],
                    x:     650, y: 100 + Math.random()*600,
                    speed: 15 + Math.random()*15,
                    color: textColors[Math.floor(Math.random()*textColors.length)],
                });
            }
        }

        gameArea.addEventListener('pointerdown', e => { if (!e.target.closest('button')) { e.preventDefault(); triggerChomp(); } });
        window.addEventListener('keydown', e => { if (e.code === 'Space' && isPlaying) { e.preventDefault(); triggerChomp(); } });

        // ── 게임 루프 ──
        function gameLoop() {
            const cw = 600, ch = 800;

            if (actionHeat > 0 && !isCountdown) actionHeat -= 0.015;

            ctx.save();
            if (shakeIntensity > 0 && !isCountdown) {
                ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
                shakeIntensity *= 0.85;
            }

            const bgVal = Math.floor(255*(1 - actionHeat));
            ctx.fillStyle = `rgb(${bgVal},${bgVal},${bgVal})`;
            ctx.fillRect(0, 0, cw, ch);

            // 포커스 방사 효과
            if (actionHeat > 0.05 && !isCountdown) {
                ctx.save();
                ctx.translate(300, 400); focusAngle += 0.02 + actionHeat*0.1; ctx.rotate(focusAngle);
                ctx.fillStyle = `rgba(255,0,0,${0.4*actionHeat})`;
                for (let i = 0; i < 30; i++) {
                    ctx.rotate(Math.PI*2/30);
                    ctx.beginPath(); ctx.moveTo(120,-2); ctx.lineTo(cw,-20); ctx.lineTo(cw,20); ctx.lineTo(120,2); ctx.fill();
                }
                ctx.restore();
            }

            // 플로팅 텍스트
            ctx.textAlign = 'left';
            floatingTexts.forEach((t, i) => {
                ctx.font = "bold 55px 'Black Han Sans'";
                ctx.lineWidth = 6; ctx.strokeStyle = '#000'; ctx.strokeText(t.text, t.x, t.y);
                ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y);
                t.x -= t.speed;
                if (t.x < -400) floatingTexts.splice(i, 1);
            });

            ctx.drawImage(imgBody, 0, 0, cw, ch);

            // 사용자 이미지
            const imgRatio = userImageObj.width / userImageObj.height;
            let drawW = cw*0.42, drawH = drawW/imgRatio;
            if (drawH > ch*0.35) { drawH = ch*0.35; drawW = drawH*imgRatio; }
            const dX = (cw - drawW)/2 + 10, dY = ch*0.45;
            const curEat = (drawH+20) * (eatProgress/200);
            const mUp = Math.min(3, curEat), bDn = curEat > 3 ? curEat-3 : 0;

            ctx.save();
            ctx.beginPath();
            const bY = ch*0.45 + bDn;
            ctx.moveTo(0, bY);
            for (let i = 0; i <= 20; i++) ctx.lineTo(i*(cw/20), bY + (i%2===0 ? 12 : -12));
            ctx.lineTo(cw, ch); ctx.lineTo(0, ch); ctx.closePath(); ctx.clip();
            ctx.drawImage(userImageObj, dX, dY-mUp, drawW, drawH);
            ctx.restore();

            // 머리
            if (chompFrames > 0 && !isCountdown) {
                ctx.drawImage(imgHeadChomp, 0, ch*0.05, cw, ch);
                chompFrames--;
            } else {
                ctx.drawImage(imgHeadIdle, 0, 0, cw, ch);
            }

            // 부스러기
            crumbs.forEach((c, i) => {
                c.vy += 1.5; c.x += c.vx; c.y += c.vy; c.angle += c.spin; c.life -= 0.025;
                if (c.life <= 0) { crumbs.splice(i, 1); return; }
                ctx.save(); ctx.globalAlpha = c.life;
                ctx.translate(c.x, c.y); ctx.rotate(c.angle);
                ctx.fillStyle = c.color; ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(-c.size/2, -c.size/2, c.size, c.size);
                ctx.restore();
            });

            ctx.restore();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ── 게임 종료 ──
        function endGame() {
            isPlaying = false;
            clearInterval(gameTimerInterval);

            // 녹화 중이면 stop
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                clearInterval(recInterval);
                recTimerTag.textContent = '';
                setTimeout(() => {
                    if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                }, 200);
            }

            finalResultText.innerHTML =
                `${currentMode==='10sec' ? '10초 챌린지에서' : '무한 모드에서'}<br>` +
                `<span style="color:#FFFF00;font-size:4rem;-webkit-text-stroke:3px #000;">${clicks}번</span><br>` +
                `처먹었어요!`;

            showScreen(screenResult);
        }

        finishGameBtn.addEventListener('click', endGame);

        // ── 영상 저장 ──
        saveVideoBtn.addEventListener('click', () => {
            if (!videoBlobUrl) { alert('영상이 아직 준비되지 않았습니다.'); return; }
            const a = document.createElement('a');
            a.href     = videoBlobUrl;
            a.download = `먹방_${clicks}번.webm`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });

        // ── 트위터 ──
        document.getElementById('share-x-btn').addEventListener('click', () => {
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`★뭐든 먹어드립니다★ ${clicks}번 처먹음! #다묵자 #토끼먹방`)}`, '_blank');
        });

        // ── 다시 하기 ──
        document.getElementById('retry-btn').addEventListener('click', () => location.reload());
    </script>
</body>
