<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다묵자</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF0000; 
            --bg-color: #FFFF00;      
            --text-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,0,0,0.05) 20px, rgba(0,0,0,0.05) 40px);
            color: var(--text-color);
            font-family: '궁서', 'Gungsuh', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.1s;
        }

        .black-han { font-family: 'Black Han Sans', sans-serif; }

        .screen {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            background-color: #FFFFFF;
            border: 6px dashed var(--primary-color);
            box-shadow: 12px 12px 0px #0000EE; 
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .screen.active { display: flex; }

        button, .btn-label {
            background: linear-gradient(180deg, #FF3333 0%, #990000 100%);
            color: #FFFF00;
            border: 5px solid #000000;
            border-radius: 0; 
            padding: 15px 20px;
            font-size: 1.5rem;
            font-family: 'Black Han Sans', sans-serif;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            width: 100%;
            max-width: 350px;
            margin-top: 15px;
            line-height: 1.2;
            box-shadow: 6px 6px 0px #000000;
            transform: skewX(-5deg); 
            transition: all 0.1s;
            text-shadow: 2px 2px 0px #000;
            position: relative;
            z-index: 10;
        }

        button:active, .btn-label:active {
            transform: skewX(-5deg) translate(6px, 6px);
            box-shadow: 0px 0px 0px #000000;
            background: #FF0000;
        }

        button:disabled {
            background: #888888;
            color: #CCCCCC;
            border-color: #555;
            box-shadow: none;
            text-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .share-btn-x {
            background: linear-gradient(180deg, #555555 0%, #000000 100%);
            color: #FFFFFF;
        }

        #screen-input { justify-content: center; gap: 10px; }

        .title {
            font-size: clamp(2rem, 9vw, 3rem); 
            white-space: nowrap;
            color: var(--primary-color);
            margin-bottom: 0px;
            text-align: center;
            -webkit-text-stroke: 2px #000;
            text-shadow: 4px 4px 0px #FFFF00;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .title-rabbit-img {
            width: 140px; height: 140px;
            object-fit: contain;
            margin-bottom: -55px; 
            filter: drop-shadow(6px 6px 0px #0000EE); 
            position: relative; z-index: 1; 
        }

        .profile-text {
            color: #0000EE; font-size: 1.2rem; font-weight: bold;
            text-align: center; background-color: #FFFF00;
            padding: 5px; border: 2px solid #000;
            width: 100%; position: relative; z-index: 10; 
        }

        .instruction-desc {
            color: #FFFFFF; background-color: #FF0000;
            font-size: 1.2rem; font-weight: bold;
            padding: 10px; text-align: center;
            line-height: 1.4; word-break: keep-all;
            border: 3px solid #000; width: 100%;
            position: relative; z-index: 10;
        }

        .mode-container {
            background-color: #000000; width: 100%;
            padding: 10px 15px 15px 15px;
            border: 4px solid #000; margin-bottom: 15px;
            box-shadow: 6px 6px 0px #0000EE;
            display: flex; flex-direction: column;
            align-items: center; position: relative; z-index: 10;
        }

        .mode-header { color: #00FF00; font-size: 1.3rem; margin-bottom: 10px; text-align: center; text-shadow: 1px 1px 0px #333; }

        .mode-selection { display: flex; gap: 10px; width: 100%; }
        .mode-radio { display: none; }
        .mode-label {
            flex: 1; padding: 10px 5px;
            border: 4px solid #000; background-color: #DDDDDD; color: #000;
            text-align: center; font-family: 'Black Han Sans', sans-serif;
            font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0px #FFFF00; 
        }
        .mode-radio:checked + .mode-label {
            background-color: #FF00FF; color: #FFFFFF; border-color: #FFFFFF;
            animation: bg-blink 0.3s infinite;
        }
        @keyframes bg-blink {
            0% { background-color: #FF00FF; } 50% { background-color: #0000EE; } 100% { background-color: #FF00FF; }
        }

        #image-upload {
            position: absolute; width: 1px; height: 1px;
            padding: 0; margin: -1px; overflow: hidden;
            clip: rect(0,0,0,0); border: 0;
        }

        .preview-container {
            width: 100%; height: 220px;
            border: 8px inset #00FF00; background-color: #000000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; text-align: center;
            color: #FFFF00; font-size: 1.2rem; font-weight: bold;
            position: relative; z-index: 10;
        }
        .preview-container.dragover { background-color: #FF0000; border-color: #FFFF00; }
        #image-preview { width: 100%; height: 100%; display: none; object-fit: contain; }

        #screen-game {
            cursor: pointer; border-color: #000000;
            background-color: #FF0000; box-shadow: 12px 12px 0px #FFFF00;
        }

        /* ★ 수정1: game-header에 녹화중 뱃지 포함 */
        .game-header {
            width: 100%; display: flex;
            justify-content: space-between; align-items: center;
            padding: 5px 10px; font-size: 2rem;
            color: #FFFF00; text-shadow: 2px 2px 0px #000;
            -webkit-text-stroke: 1px #000; pointer-events: none;
            flex-wrap: wrap; gap: 4px;
        }

        /* 타이머+뱃지를 한 줄에 */
        .timer-wrap { display: flex; align-items: center; gap: 8px; }

        #rec-status-badge {
            background: #000; color: #FF0000;
            border: 2px solid #FF0000;
            font-size: 0.85rem; padding: 3px 10px;
            font-family: 'Black Han Sans', sans-serif;
            animation: fast-blink 0.5s infinite;
            display: none; /* JS에서 표시 */
            white-space: nowrap;
        }

        .timer-red { color: #FFFFFF; animation: fast-blink 0.2s infinite; }
        @keyframes fast-blink { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.8; transform: scale(1.05); } 
        }

        .instruction-text {
            color: #FFFFFF; font-size: 1.5rem;
            background-color: #000; padding: 5px;
            margin-bottom: 10px; text-align: center;
            pointer-events: none; animation: fast-blink 0.5s infinite;
        }

        .game-area {
            position: relative; width: 100%; max-width: 400px;
            aspect-ratio: 3 / 4; margin: 0 auto;
            touch-action: none; border: 8px solid #000;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: white; pointer-events: none;
        }

        #main-canvas { width: 100%; height: 100%; display: block; }

        /* ★ recording-ui 완전 제거 — 대신 game-header 안 뱃지 사용 */

        .shake-active { animation: intense-shake 0.1s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes intense-shake {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-5px,5px) rotate(-2deg); }
            50% { transform: translate(5px,-5px) rotate(2deg); }
            75% { transform: translate(-5px,-5px) rotate(0deg); }
            100% { transform: translate(5px,5px) rotate(-2deg); }
        }

        #countdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.8); display: none;
            align-items: center; justify-content: center;
            color: #FFFF00; font-size: 8rem; -webkit-text-stroke: 4px #000;
            font-family: 'Black Han Sans', sans-serif; z-index: 100;
        }

        #finish-game-btn { margin-top: 20px; pointer-events: auto; }

        #screen-result { justify-content: center; background-color: #000000; border-color: #FFFF00; }
        #screen-result h2 { color: #FF0000; font-size: 3rem; -webkit-text-stroke: 1px #FFF; }
        .result-count { font-size: 3rem; color: #FFFF00; margin: 10px 0 20px 0; text-align: center; -webkit-text-stroke: 2px #000; }

        .video-container {
            width: 100%; max-width: 350px; border: 6px solid #FF0000;
            overflow: hidden; box-shadow: 6px 6px 0px #FFFF00;
            margin-bottom: 20px; display: none; background-color: #222;
        }
        #result-video { width: 100%; display: block; }

        #record-error-msg {
            display: none; color: #FFFF00; font-size: 1.1rem;
            font-weight: bold; text-align: left; margin-bottom: 15px;
            background-color: #FF0000; padding: 15px;
            border: 4px solid #000; width: 100%; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="screen-input" class="screen active">
        <h1 class="title black-han">★뭐든 먹어드립니다★</h1>
        <img src="assets/rabbit-head-idle.png" alt="콰삭이" class="title-rabbit-img">
        <marquee scrollamount="15" class="profile-text">
            ▶ 이름: 콰삭이 ◀ ▶ 스펙: 처먹기 경력 베테랑 수준 ◀ 
        </marquee>
        <div class="instruction-desc">
            없0ㅓ졌으면 ㅎr는 것 ❅의로ㅣ 혼r영!<br>
            학교, 호ㅣㅅr, ㅅㅣ✿험, 싫0ㅓㅎr는 ㅅr람 등<br>
            무ㅓ든 ≫⚄먹0ㅓ드립ㄴㅣㄷr.❑
        </div>
        <div class="mode-container">
            <div class="mode-header black-han">▼ 게임 모드 선택 ▼</div>
            <div class="mode-selection">
                <input type="radio" name="game-mode" id="mode-infinite" value="infinite" class="mode-radio" checked>
                <label for="mode-infinite" class="mode-label">무한 갉아먹기</label>
                <input type="radio" name="game-mode" id="mode-10sec" value="10sec" class="mode-radio">
                <label for="mode-10sec" class="mode-label">10초 챌린지</label>
            </div>
        </div>
        <div class="preview-container" id="drop-zone">
            <span id="preview-placeholder">
                [여기로 사진을 끌어오거나<br>아래 버튼을 누르시오]<br><br>
                <span style="font-size:1rem;color:#00FF00;text-decoration:underline;">※ 배경이 투명한 이미지일수록 좋아요! ※</span>
            </span>
            <img id="image-preview" src="" alt="미리보기">
        </div>
        <label for="image-upload" class="btn-label">사진 선택하기</label>
        <input type="file" id="image-upload" accept="image/*">
        <button id="start-btn" disabled>
            💥쾁찹찹추찹찹추💥<br>
            <span style="font-size:1rem;color:#FFFF00;font-family:'궁서';text-shadow:none;-webkit-text-stroke:0;">(먹이러 가기)</span>
        </button>
    </div>

    <div id="screen-game" class="screen">
        <div class="instruction-text black-han">!! 클릭, 터치, 스페이스바 미친듯이 연타 !!</div>
        <div class="game-header black-han">
            <!-- ★ 수정1: 타이머 옆에 녹화중 뱃지 -->
            <div class="timer-wrap">
                <div id="timer-display">타이머: --</div>
                <div id="rec-status-badge">🔴 녹화중(5초)</div>
            </div>
            <div id="click-count">0번</div>
        </div>
        <div class="game-area" id="game-area">
            <canvas id="main-canvas" width="600" height="800"></canvas>
            <!-- recording-ui 완전 삭제 -->
            <div id="countdown-overlay">3</div>
        </div>
        <button id="finish-game-btn" style="display:none;">결과 보기 (종료)</button>
    </div>

    <div id="screen-result" class="screen">
        <h2 class="black-han">★ 결과 발표 ★</h2>
        <div class="result-count black-han" id="final-result-text">--번 처먹었어요!</div>
        <div id="record-error-msg"></div>
        <div class="video-container" id="video-container">
            <video id="result-video" controls autoplay loop playsinline muted></video>
        </div>
        <button id="save-video-btn" style="display:none;background:#FF00FF;">녹화된 영상 저장하기</button>
        <button id="share-x-btn" class="share-btn-x">𝕏 (Twitter) 자랑하기</button>
        <button id="retry-btn" style="background:#555;">다시 하기</button>
    </div>

    <script>
        // --- 에셋 ---
        const imgBody      = new Image(); imgBody.src      = 'assets/rabbit-body.png';
        const imgHeadIdle  = new Image(); imgHeadIdle.src  = 'assets/rabbit-head-idle.png';
        const imgHeadChomp = new Image(); imgHeadChomp.src = 'assets/rabbit-head-chomp.png';

        // ★ 수정2: Web Audio API로 소리 → 영상에 포함
        let audioCtx  = null;
        let audioDest = null;
        let eatBuffer = null;

        async function initAudio() {
            if (audioCtx) return;
            audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
            audioDest = audioCtx.createMediaStreamDestination();

            // masterGain: 스피커 + 녹화 스트림 동시 연결
            const gain = audioCtx.createGain();
            gain.gain.value = 0.6;
            gain.connect(audioCtx.destination);
            gain.connect(audioDest);
            audioCtx._gain = gain;

            try {
                const res = await fetch('assets/eat.mp3');
                const buf = await res.arrayBuffer();
                eatBuffer = await audioCtx.decodeAudioData(buf);
            } catch(e) { console.warn('eat.mp3 로드 실패:', e); }
        }

        function playEatSound() {
            if (!audioCtx || !eatBuffer) return;
            const src = audioCtx.createBufferSource();
            src.buffer = eatBuffer;
            src.connect(audioCtx._gain);
            src.start(0);
        }

        // --- 상태 ---
        let currentMode = 'infinite';
        let userImageObj = new Image(), isImageLoaded = false;
        let clicks = 0, eatProgress = 0;
        const MAX_EAT = 200;
        let isPlaying = false, isCountdown = false;
        let gameTimerInterval = null, gameTimeLeft = 10;
        let chompFrames = 0, floatingTexts = [], shakeIntensity = 0;
        let actionHeat = 0, focusAngle = 0, crumbs = [];
        const popWords   = ['다처먹어주마','쾁쾁쾁','첩첩첩'];
        const textColors = ['#ffffff','#ffea00','#ff6600','#00ffcc','#ff99ff'];
        let mediaRecorder, recordedChunks = [], videoBlobUrl = null;
        let isRecording = false, recTimeLeft = 5, recInterval = null;
        let animationFrameId = null;

        // --- DOM ---
        const screenInput      = document.getElementById('screen-input');
        const screenGame       = document.getElementById('screen-game');
        const screenResult     = document.getElementById('screen-result');
        const imageUpload      = document.getElementById('image-upload');
        const dropZone         = document.getElementById('drop-zone');
        const imagePreview     = document.getElementById('image-preview');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const startBtn         = document.getElementById('start-btn');
        const timerDisplay     = document.getElementById('timer-display');
        const recStatusBadge   = document.getElementById('rec-status-badge');
        const clickCountDisplay= document.getElementById('click-count');
        const gameArea         = document.getElementById('game-area');
        const mainCanvas       = document.getElementById('main-canvas');
        const ctx              = mainCanvas.getContext('2d');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const finishGameBtn    = document.getElementById('finish-game-btn');
        const finalResultText  = document.getElementById('final-result-text');
        const resultVideo      = document.getElementById('result-video');
        const videoContainer   = document.getElementById('video-container');
        const saveVideoBtn     = document.getElementById('save-video-btn');
        const recordErrorMsg   = document.getElementById('record-error-msg');
        const shareXBtn        = document.getElementById('share-x-btn');
        const retryBtn         = document.getElementById('retry-btn');

        document.getElementsByName('game-mode').forEach(r =>
            r.addEventListener('change', e => currentMode = e.target.value)
        );

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const url = ev.target.result;
                    imagePreview.src = url;
                    imagePreview.style.display = 'block';
                    previewPlaceholder.style.display = 'none';
                    userImageObj = new Image();
                    userImageObj.onload = () => { isImageLoaded = true; startBtn.disabled = false; };
                    userImageObj.src = url;
                };
                reader.readAsDataURL(file);
            }
        }

        imageUpload.addEventListener('click', e => e.target.value = null);
        imageUpload.addEventListener('change', e => handleFile(e.target.files[0]));
        dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        function showScreen(s) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            s.classList.add('active');
        }

        startBtn.addEventListener('click', async () => {
            if (!isImageLoaded) return;
            startBtn.disabled = true;
            await initAudio();
            startBtn.disabled = false;

            clicks = 0; eatProgress = 0; floatingTexts = []; recordedChunks = [];
            videoBlobUrl = null; crumbs = []; shakeIntensity = 0; actionHeat = 0;
            clickCountDisplay.textContent = '0번';
            finishGameBtn.style.display = 'none';
            recStatusBadge.style.display = 'none';
            videoContainer.style.display = 'none';
            saveVideoBtn.style.display = 'none';
            recordErrorMsg.style.display = 'none';
            resultVideo.src = '';

            // 캔버스 초기화 (잔상 제거)
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);

            showScreen(screenGame);
            isCountdown = true; isPlaying = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();

            countdownOverlay.style.display = 'flex';
            let cd = 3; countdownOverlay.textContent = cd;
            const cdInt = setInterval(() => {
                cd--;
                if (cd > 0) { countdownOverlay.textContent = cd; }
                else { clearInterval(cdInt); countdownOverlay.style.display = 'none'; startGameLogic(); }
            }, 1000);
        });

        function startGameLogic() {
            isCountdown = false; isPlaying = true;
            isRecording = true; recTimeLeft = 5;

            // ★ 녹화중 뱃지: 타이머 옆에만 표시
            recStatusBadge.style.display = 'block';
            recStatusBadge.textContent = '🔴 녹화중(5초)';

            try {
                // ★ 비디오(캔버스) + 오디오(Web Audio) 합쳐서 녹화
                const videoStream = mainCanvas.captureStream(30);
                const audioStream = audioDest.stream;
                const combined = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...audioStream.getAudioTracks(),
                ]);

                const types = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
                const mimeType = types.find(t => { try { return MediaRecorder.isTypeSupported(t); } catch { return false; } }) || 'video/webm';

                mediaRecorder = new MediaRecorder(combined, { mimeType });
                mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    setTimeout(() => {
                        try {
                            if (recordedChunks.length === 0) throw new Error('녹화된 프레임 없음');
                            const blob = new Blob(recordedChunks, { type: mimeType });
                            videoBlobUrl = URL.createObjectURL(blob);
                            resultVideo.src = videoBlobUrl;
                            videoContainer.style.display = 'block';
                            saveVideoBtn.style.display = 'inline-block';
                            recordErrorMsg.style.display = 'none';
                        } catch(e) {
                            showRecordingError(e.message);
                        }
                    }, 100);
                };
                mediaRecorder.start(100);
            } catch(err) {
                console.error('녹화 초기화 실패:', err);
                isRecording = false;
                recStatusBadge.style.display = 'none';
                showRecordingError(err.message);
            }

            recInterval = setInterval(() => {
                recTimeLeft--;
                if (recTimeLeft > 0) {
                    recStatusBadge.textContent = `🔴 녹화중(${recTimeLeft}초)`;
                } else {
                    clearInterval(recInterval);
                    recStatusBadge.style.display = 'none'; // 녹화 끝나면 뱃지 사라짐
                    if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop(); isRecording = false;
                    }
                }
            }, 1000);

            if (currentMode === '10sec') {
                gameTimeLeft = 10;
                timerDisplay.textContent = `타이머: ${gameTimeLeft}초`;
                timerDisplay.classList.remove('timer-red');
                gameTimerInterval = setInterval(() => {
                    gameTimeLeft--;
                    timerDisplay.textContent = `타이머: ${gameTimeLeft}초`;
                    if (gameTimeLeft <= 3) timerDisplay.classList.add('timer-red');
                    if (gameTimeLeft <= 0) endGame();
                }, 1000);
            } else {
                timerDisplay.textContent = '타이머: 무한';
                timerDisplay.classList.remove('timer-red');
                finishGameBtn.style.display = 'block';
            }
        }

        function showRecordingError(errMsg) {
            recordErrorMsg.style.display = 'block';
            recordErrorMsg.innerHTML = `⚠️ <b>영상 녹화 실패</b><br><span style="font-size:0.85em;">${errMsg}</span><br><br>💡 GitHub Pages에서는 정상 작동합니다.`;
        }

        function triggerChomp() {
            if (!isPlaying) return;
            clicks++; eatProgress++;
            clickCountDisplay.textContent = `${clicks}번`;
            if (eatProgress >= MAX_EAT) eatProgress = 0;

            actionHeat = Math.min(1, actionHeat + 0.25);
            playEatSound(); // ★ Web Audio → 영상에 소리 포함

            gameArea.classList.remove('shake-active');
            void gameArea.offsetWidth;
            gameArea.classList.add('shake-active');
            shakeIntensity = 20; chompFrames = 6;

            const numCrumbs = Math.floor(Math.random() * 5) + 4;
            for (let i = 0; i < numCrumbs; i++) {
                crumbs.push({
                    x: mainCanvas.width/2 + (Math.random()*80-40),
                    y: mainCanvas.height*0.45 + (Math.random()*20-10),
                    vx: (Math.random()-0.5)*20, vy: (Math.random()*-15)-5,
                    life: 1.0, size: Math.random()*10+5,
                    color: textColors[Math.floor(Math.random()*textColors.length)],
                    angle: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.8,
                });
            }
            if (Math.random() < 0.6) {
                const cnt = Math.floor(Math.random()*3)+1;
                for (let i = 0; i < cnt; i++) {
                    floatingTexts.push({
                        text:  popWords[Math.floor(Math.random()*popWords.length)],
                        x:     mainCanvas.width + Math.random()*100,
                        y:     100 + Math.random()*(mainCanvas.height-200),
                        speed: 15 + Math.random()*15,
                        color: textColors[Math.floor(Math.random()*textColors.length)],
                    });
                }
            }
        }

        screenGame.addEventListener('pointerdown', e => {
            if (e.target.closest('button')) return;
            e.preventDefault(); triggerChomp();
        });
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && isPlaying) { e.preventDefault(); triggerChomp(); }
        });

        function gameLoop() {
            if (!isPlaying && !isRecording && !isCountdown) return;
            const cw = mainCanvas.width, ch = mainCanvas.height;
            if (actionHeat > 0 && !isCountdown) { actionHeat -= 0.015; if (actionHeat < 0) actionHeat = 0; }

            ctx.save();
            if (shakeIntensity > 0 && !isCountdown) {
                ctx.translate((Math.random()-0.5)*shakeIntensity, (Math.random()-0.5)*shakeIntensity);
                shakeIntensity *= 0.85; if (shakeIntensity < 0.5) shakeIntensity = 0;
            }

            const bgVal = Math.floor(255*(1-actionHeat));
            ctx.fillStyle = `rgb(${bgVal},${bgVal},${bgVal})`;
            ctx.fillRect(0, 0, cw, ch);

            if (actionHeat > 0.05 && !isCountdown) {
                ctx.save(); ctx.translate(cw/2, ch/2);
                focusAngle += 0.02 + actionHeat*0.1; ctx.rotate(focusAngle);
                ctx.fillStyle = `rgba(255,0,0,${0.4*actionHeat})`;
                for (let i = 0; i < 30; i++) {
                    ctx.rotate(Math.PI*2/30);
                    ctx.beginPath(); ctx.moveTo(120,-2); ctx.lineTo(cw,-20); ctx.lineTo(cw,20); ctx.lineTo(120,2); ctx.fill();
                }
                ctx.restore();
            }

            ctx.textAlign = 'left';
            for (let i = floatingTexts.length-1; i >= 0; i--) {
                const t = floatingTexts[i];
                ctx.font = "bold 55px 'Black Han Sans',sans-serif";
                ctx.lineWidth = 6; ctx.strokeStyle = '#000'; ctx.strokeText(t.text, t.x, t.y);
                ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y);
                t.x -= t.speed; if (t.x < -300) floatingTexts.splice(i, 1);
            }

            ctx.drawImage(imgBody, 0, 0, cw, ch);

            // ── 이미지 갉아먹기 ──
            // 토끼 입 위치: ch * 0.45 부근. 상한선은 입보다 3px 위
            const MOUTH_Y   = ch * 0.8;   // 토끼 입 Y좌표 (이미지 교체 시 조정)
            const UPPER_CAP = MOUTH_Y - 3; // 이미지가 올라갈 수 있는 최대 Y (상한선)

            const imgRatio = userImageObj.width / userImageObj.height;
            let drawW = cw * 0.42, drawH = drawW / imgRatio;
            if (drawH > ch * 0.35) { drawH = ch * 0.35; drawW = drawH * imgRatio; }
            const drawX = (cw - drawW) / 2 + 10;

            // eatProgress 0→MAX_EAT 동안:
            // - 이미지 하단 Y는 MOUTH_Y 고정
            // - 이미지가 위로 올라가되 UPPER_CAP(입 3px 위)까지만
            // - 그 이상은 위쪽 클리핑(깎임)으로 처리
            const maxRise  = drawH * 0.85;                        // 최대 올라갈 수 있는 픽셀
            const rawRise  = maxRise * (eatProgress / MAX_EAT);   // 현재 올라간 양
            const clampedRise = Math.min(rawRise, drawH);

            // 이미지 하단을 MOUTH_Y에 고정하고 위로 올림
            const imgBottom = MOUTH_Y;
            const imgTop    = imgBottom - drawH + clampedRise;     // 갉힐수록 위쪽이 올라옴

            // 화면에 그릴 Y (이미지 실제 top)
            const drawY = imgTop;

            // 클리핑: 위쪽은 UPPER_CAP 이상 안 보임 (상한선 초과분 잘라냄)
            // + 이빨 자국: 클리핑 상단 경계를 들쭉날쭉하게
            const clipTop = Math.max(imgTop, UPPER_CAP - clampedRise * 0.0); // 깎인 만큼 위가 잘림
            // 실제로 보이는 이미지 top = 이미지가 올라갈수록 잘리는 부분 증가
            const visibleTop = UPPER_CAP - (drawH - clampedRise) + (drawH - clampedRise);
            // 간단하게: 클리핑 상단 = 이미지 top (올라갈수록 위가 잘림)
            // 하단 고정 = MOUTH_Y

            ctx.save();
            ctx.beginPath();

            // 들쭉날쭉한 상단 경계 (이빨 자국)
            const teethCount = 18;
            const teethW     = drawW / teethCount;
            const teethDepth = 8 + clampedRise * 0.08; // 갉힐수록 더 깊은 이빨 자국

            ctx.moveTo(drawX, drawY);
            for (let i = 0; i <= teethCount; i++) {
                const tx = drawX + i * teethW;
                // 홀수: 안으로 파임, 짝수: 바깥
                const ty = drawY + (i % 2 === 0 ? 0 : teethDepth);
                ctx.lineTo(tx, ty);
            }
            // 오른쪽 → 하단 → 왼쪽으로 닫기
            ctx.lineTo(drawX + drawW, MOUTH_Y);
            ctx.lineTo(drawX,         MOUTH_Y);
            ctx.closePath();
            ctx.clip();

            ctx.drawImage(userImageObj, drawX, drawY, drawW, drawH);
            ctx.restore();

            if (chompFrames > 0 && !isCountdown) { ctx.drawImage(imgHeadChomp, 0, ch*0.05, cw, ch); chompFrames--; }
            else ctx.drawImage(imgHeadIdle, 0, 0, cw, ch);

            for (let i = crumbs.length-1; i >= 0; i--) {
                const c = crumbs[i];
                c.vy += 1.5; c.x += c.vx; c.y += c.vy; c.angle += c.spin; c.life -= 0.025;
                if (c.life <= 0) { crumbs.splice(i, 1); continue; }
                ctx.save(); ctx.globalAlpha = c.life;
                ctx.translate(c.x, c.y); ctx.rotate(c.angle);
                ctx.fillStyle = c.color; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(-c.size/2,-c.size/2,c.size,c.size);
                ctx.restore();
            }
            ctx.globalAlpha = 1.0;
            ctx.restore();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimerInterval);
            recStatusBadge.style.display = 'none';
            if (isRecording && mediaRecorder && mediaRecorder.state !== 'inactive') {
                clearInterval(recInterval); mediaRecorder.stop(); isRecording = false;
            }
            const modeText = currentMode === '10sec' ? '10초 챌린지에서' : '무한 갉아먹기 모드에서';
            finalResultText.innerHTML = `${modeText}<br><span style="color:#FFFF00;font-size:4rem;-webkit-text-stroke:3px #000;">${clicks}번</span><br>처먹었어요!`;
            showScreen(screenResult);
        }

        finishGameBtn.addEventListener('click', endGame);

        saveVideoBtn.addEventListener('click', () => {
            if (!videoBlobUrl) return;
            const a = document.createElement('a');
            a.download = `뭐든_먹어드립니다_${clicks}.webm`;
            a.href = videoBlobUrl;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });

        shareXBtn.addEventListener('click', () => {
            const modeText = currentMode === '10sec' ? '10초 동안' : '무한 갉아먹기 모드에서';
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`뭐든 먹어드립니다!\n${modeText} ${clicks}번 처먹었어요!\n\n#뭐든먹어드립니다 #다묵자`)}`, '_blank');
        });

        retryBtn.addEventListener('click', () => showScreen(screenInput));
    </script>
</body>
